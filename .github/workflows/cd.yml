name: CD — prod container + release

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-push-prod:
    name: Build & push production container
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate version tag
        id: version
        run: |
          TAG="v$(date +%Y.%m.%d)-$(echo ${GITHUB_SHA} | cut -c1-7)"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Version: ${TAG}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # GITHUB_TOKEN is automatic — no stored secrets needed
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push prod image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-push-prod
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-push-prod.outputs.version }}
          name: ${{ needs.build-push-prod.outputs.version }}
          generate_release_notes: true
          body: |
            ## Production deploy

            **Image:** `ghcr.io/${{ github.repository }}:${{ needs.build-push-prod.outputs.version }}`

            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ needs.build-push-prod.outputs.version }}
            docker run -p 80:80 ghcr.io/${{ github.repository }}:${{ needs.build-push-prod.outputs.version }}
            ```
