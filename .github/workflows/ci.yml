name: CI — PR (dev container)

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-dev:
    name: Build & push dev container
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write   # to comment image tag back on the PR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # GITHUB_TOKEN is automatic — no stored secrets needed
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=dev-pr-${{ github.event.number }}
            type=sha,prefix=dev-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push dev image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Comment image tag on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '🐳 **Dev container published to GitHub Packages**',
                '',
                '```bash',
                `docker pull ghcr.io/${{ github.repository }}:dev-pr-${{ github.event.number }}`,
                `docker run -p 8080:80 ghcr.io/${{ github.repository }}:dev-pr-${{ github.event.number }}`,
                '```',
                '',
                `Also tagged: \`dev-${context.sha.slice(0, 7)}\``,
              ].join('\n')
            })
