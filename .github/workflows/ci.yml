name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [dev]

jobs:
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: website-personal:pr-${{ github.event.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  lint-html:
    name: Validate HTML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run html-validate
        uses: nickmaccarthy/html-validate-action@v1
        with:
          files: "src/**/*.html"
        continue-on-error: true  # non-blocking until rules are tuned
